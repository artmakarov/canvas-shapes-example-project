<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas Shapes</title>
    <link rel="stylesheet" href="./styles/main.css?v=0.1.0">
</head>

<body>
<div class="demo-info">
    <a href="./example-extended-buttons.html">example-extended-buttons.html</a>
</div>

<div class="toolbar">
    <!-- Кнопки будут созданы динамически -->
</div>

<div id="canvasWrapper" class="canvas-wrapper">
    <canvas id="canvas"></canvas>

    <div id="info" class="info">
        Кликните Add для создания фигур. Кликните на фигуру для выбора.
    </div>
</div>

<script type="module">
  import { CanvasApp } from './js/app/canvas.app.js?v=0.1.0';
  import { ColorPalette } from './js/models/color-palette.model.js?v=0.1.0';
  import { RectangleFactory } from './js/factories/rectangle.factory.js?v=0.1.0';
  import { ArrowConnectionFactory } from './js/factories/arrow-connection.factory.js?v=0.1.0';
  import { SmartConnectionGenerator } from './js/generators/smart-connection.generator.js?v=0.1.0';
  import { CanvasShapeManager } from './js/managers/canvas-shape.manager.js?v=0.1.0';
  import { CanvasButtonManager } from './js/managers/canvas-button.manager.js?v=0.1.0';
  import { CanvasUIManager } from './js/managers/canvas-ui.manager.js?v=0.1.0';
  import { Canvas2DRenderer } from './js/renderers/canvas-2d.renderer.js?v=0.1.0';

  const buttonManager = new CanvasButtonManager();

  window.addEventListener('load', () => {
    new CanvasApp({
      buttonManager,
      shapeFactory: new RectangleFactory(new ColorPalette()),
      connectionFactory: new ArrowConnectionFactory(),
      connectionGenerator: new SmartConnectionGenerator(),
      shapeManager: new CanvasShapeManager(),
      uiManager: new CanvasUIManager(buttonManager),
      renderer: new Canvas2DRenderer(
        document.getElementById('canvasWrapper'),
        document.getElementById('canvas'),
      ),
    });
  });
</script>
</body>
</html>
